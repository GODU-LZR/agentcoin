services:
  agentcoin-node-a:
    build:
      context: .
      dockerfile: Dockerfile
    command:
      - agentcoin-node
      - --config
      - configs/demo/node-a.json
    ports:
      - "8081:8080"
    volumes:
      - ./configs:/app/configs:ro
      - ./var/demo/node-a:/app/var
    environment:
      PYTHONUNBUFFERED: "1"
    healthcheck:
      test:
        - CMD-SHELL
        - python -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/healthz').read()"
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      agentcoin-demo:
        ipv4_address: 172.30.0.11

  agentcoin-node-b:
    build:
      context: .
      dockerfile: Dockerfile
    command:
      - agentcoin-node
      - --config
      - configs/demo/node-b.json
    ports:
      - "8082:8080"
    volumes:
      - ./configs:/app/configs:ro
      - ./var/demo/node-b:/app/var
    environment:
      PYTHONUNBUFFERED: "1"
    healthcheck:
      test:
        - CMD-SHELL
        - python -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/healthz').read()"
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      agentcoin-demo:
        ipv4_address: 172.30.0.12

  agentcoin-node-c:
    build:
      context: .
      dockerfile: Dockerfile
    command:
      - agentcoin-node
      - --config
      - configs/demo/node-c.json
    ports:
      - "8083:8080"
    volumes:
      - ./configs:/app/configs:ro
      - ./var/demo/node-c:/app/var
    environment:
      PYTHONUNBUFFERED: "1"
    healthcheck:
      test:
        - CMD-SHELL
        - python -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/healthz').read()"
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      agentcoin-demo:
        ipv4_address: 172.30.0.13

  agentcoin-worker-b:
    build:
      context: .
      dockerfile: Dockerfile
    command:
      - agentcoin-worker
      - --node-url
      - http://agentcoin-node-b:8080
      - --token
      - demo-token-b
      - --worker-id
      - demo-worker-b
      - --capability
      - worker
      - --capability
      - python
      - --poll-seconds
      - "1"
      - --disable-env-proxy
    depends_on:
      agentcoin-node-b:
        condition: service_healthy
    environment:
      PYTHONUNBUFFERED: "1"
    networks:
      - agentcoin-demo

  agentcoin-worker-c:
    build:
      context: .
      dockerfile: Dockerfile
    command:
      - agentcoin-worker
      - --node-url
      - http://agentcoin-node-c:8080
      - --token
      - demo-token-c
      - --worker-id
      - demo-reviewer-c
      - --capability
      - reviewer
      - --poll-seconds
      - "1"
      - --disable-env-proxy
    depends_on:
      agentcoin-node-c:
        condition: service_healthy
    environment:
      PYTHONUNBUFFERED: "1"
    networks:
      - agentcoin-demo

networks:
  agentcoin-demo:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/24